<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LibraryMS — Ajevi Precious Hellen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2C59;
  --parchment:#F8F1E5;
  --crimson:#D04848;
  --charcoal:#1E2022;
  --navy-light:#1a3a6e;
  --navy-dark:#0a1e3d;
  --parchment-dark:#ede4d0;
  --crimson-dark:#b03838;
  --border:#d9cdb8;
  --muted:#6b7280;
  --success:#2d6a4f;
  --warning:#b45309;
  --white:#fff;
}
body{font-family:'Inter',sans-serif;background:var(--parchment);color:var(--charcoal);min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}

/* ── NAV ── */
nav{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,44,89,.25)}
.nav-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none}
.nav-logo{width:38px;height:38px;background:var(--crimson);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:1.2rem;color:#fff}
.nav-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:#fff;letter-spacing:.01em}
.nav-subtitle{font-size:.7rem;color:rgba(255,255,255,.55);font-weight:400;display:block;margin-top:-2px}
.nav-links{display:flex;align-items:center;gap:.25rem}
.nav-link{color:rgba(255,255,255,.75);text-decoration:none;font-size:.85rem;font-weight:500;padding:.5rem .9rem;border-radius:6px;cursor:pointer;transition:all .15s;border:none;background:none;white-space:nowrap}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-link.active{color:#fff;background:rgba(208,72,72,.25);border:1px solid rgba(208,72,72,.4)}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-user{display:flex;align-items:center;gap:.6rem;cursor:pointer}
.nav-avatar{width:42px;height:42px;border-radius:50%;background:var(--crimson);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#fff;background-size:cover;background-position:center;position:relative;overflow:hidden}
.nav-username{font-size:.85rem;font-weight:500;color:rgba(255,255,255,.85)}
.nav-user-badge,.nav-role-badge{font-size:.65rem;background:rgba(208,72,72,.3);color:#f9a8a8;padding:.15rem .5rem;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:.4rem .8rem;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-logout:hover{background:var(--crimson);border-color:var(--crimson);color:#fff}

/* ── LOGIN ── */
#login-screen{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.login-header{text-align:center;margin-bottom:2.5rem}
.login-logo{width:64px;height:64px;background:var(--crimson);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:2rem;color:#fff;margin:0 auto 1rem}
.login-header h1{font-family:'Playfair Display',serif;font-size:2rem;color:#fff;font-weight:700}
.login-header p{color:rgba(255,255,255,.55);font-size:.9rem;margin-top:.3rem}
.login-card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.login-card h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:.3rem}
.login-card p{font-size:.85rem;color:var(--muted);margin-bottom:1.75rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--charcoal);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--charcoal);background:var(--parchment);transition:border-color .15s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy);background:#fff}
.btn-primary{width:100%;padding:.8rem;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.02em}
.btn-primary:hover{background:var(--navy-dark)}
.login-note{text-align:center;margin-top:1.25rem;font-size:.8rem;color:var(--muted)}
.login-note strong{color:var(--crimson)}
#login-error{color:var(--crimson);font-size:.82rem;margin-bottom:1rem;background:#fef2f2;padding:.6rem .9rem;border-radius:6px;border-left:3px solid var(--crimson);display:none}

/* ── APP SHELL ── */
#app{display:none}
.page-header{background:var(--navy);padding:2rem 2rem 2.5rem;margin-bottom:-1.5rem}
.page-header h1{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;color:#fff}
.page-header p{font-size:.85rem;color:rgba(255,255,255,.6);margin-top:.25rem}
main{padding:2rem;max-width:1280px;margin:0 auto}

/* ── CARDS ── */
.card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border)}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--parchment-dark)}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:12px;padding:1.25rem 1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);border-left:4px solid var(--navy)}
.stat-card.red{border-left-color:var(--crimson)}
.stat-card.green{border-left-color:#2d6a4f}
.stat-card.orange{border-left-color:#b45309}
.stat-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem}
.stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy)}
.stat-card.red .stat-value{color:var(--crimson)}
.stat-card.green .stat-value{color:#2d6a4f}
.stat-card.orange .stat-value{color:#b45309}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:7px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-dark)}
.btn-crimson{background:var(--crimson);color:#fff}.btn-crimson:hover{background:var(--crimson-dark)}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}.btn-outline:hover{background:var(--navy);color:#fff}
.btn-outline-red{background:#fff;color:var(--crimson);border:1.5px solid var(--crimson)}.btn-outline-red:hover{background:var(--crimson);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.75rem}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--parchment)}
.btn-success{background:#2d6a4f;color:#fff}.btn-success:hover{background:#1e4d38}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{background:var(--navy)}
thead th{padding:.8rem 1rem;text-align:left;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.85);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--parchment-dark);transition:background .1s}
tbody tr:hover{background:var(--parchment)}
tbody tr:last-child{border-bottom:none}
td{padding:.75rem 1rem;color:var(--charcoal);vertical-align:middle}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-green{background:#d1fae5;color:#065f46}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-orange{background:#fef3c7;color:#92400e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-navy{background:#dbeafe;color:var(--navy)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:.6rem 1rem .6rem 2.5rem;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;background:var(--parchment);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--navy);background:#fff}
.search-box::before{content:'🔍';position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
select.filter{padding:.6rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-size:.83rem;background:var(--parchment);font-family:'Inter',sans-serif;cursor:pointer;color:var(--charcoal);outline:none}
select.filter:focus{border-color:var(--navy)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,44,89,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--parchment-dark);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--navy)}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:.2rem .4rem;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--crimson)}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--parchment-dark);display:flex;justify-content:flex-end;gap:.75rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:.75rem;color:var(--muted);margin-top:.3rem}

/* ── ALERT ── */
.alert{padding:.85rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.6rem}
.alert-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-green{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.alert-orange{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-blue{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:1.5rem}
.activity-list{list-style:none}
.activity-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--parchment-dark)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.act-borrow{background:#dbeafe}.act-return{background:#d1fae5}.act-fine{background:#fee2e2}.act-reg{background:#fef3c7}
.activity-text{font-size:.82rem;color:var(--charcoal);line-height:1.4}
.activity-time{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.overdue-item{display:flex;align-items:center;justify-content:space-between;padding:.65rem 0;border-bottom:1px solid var(--parchment-dark);font-size:.82rem}
.overdue-item:last-child{border-bottom:none}
.overdue-days{font-weight:700;color:var(--crimson)}

/* ── REPORTS ── */
.report-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:0}
.report-tab{padding:.6rem 1.1rem;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:'Inter',sans-serif;transition:all .15s}
.report-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.report-tab:hover:not(.active){color:var(--charcoal)}

/* ── MEMBER PORTAL ── */
.member-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-radius:12px;padding:2rem;color:#fff;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem}
.member-hero-avatar{width:110px;height:110px;border-radius:50%;background:var(--crimson);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;color:#fff;flex-shrink:0;background-size:cover;background-position:center}
.member-hero h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:.25rem}
.member-hero p{font-size:.85rem;opacity:.7}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-state h3{font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:.4rem}
.empty-state p{font-size:.85rem}

/* ── TOAST ── */
#toast{position:fixed;bottom:2rem;right:2rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast-item{background:var(--navy);color:#fff;padding:.85rem 1.25rem;border-radius:10px;font-size:.85rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .2s ease;border-left:4px solid var(--crimson);max-width:320px}
.toast-item.success{border-left-color:#2d6a4f}
.toast-item.error{border-left-color:var(--crimson)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav-links{display:none}
  .dash-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .member-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  main{padding:1rem}
}
</style>
</head>

// Load saved DB from localStorage if present
if (localStorage.getItem('LibraryMS_DB')) {
  try {
    const saved = JSON.parse(localStorage.getItem('LibraryMS_DB'));
    // Merge into DB
    for (const key in saved) {
      if (typeof saved[key] === 'object' && saved[key] !== null) {
        if (Array.isArray(saved[key])) {
          DB[key] = saved[key];
        } else {
          Object.assign(DB[key], saved[key]);
        }
      } else {
        DB[key] = saved[key];
      }
    }
  } catch (e) {
    console.error("Error restoring DB", e);
  }
}

function saveLocalState() {
  try {
    localStorage.setItem('LibraryMS_DB', JSON.stringify(DB));
  } catch (e) {
    console.error("Failed to save state to localStorage:", e);
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      toast("Storage space full. Data is active in your current session, but older images could not be persisted.", "warn");
    }
  }
}

function updateNavAvatar(){
  const navAv=document.getElementById('nav-avatar');
  if(!navAv) return;
  let avatar = null;
  if (currentUser) {
    if (currentUser.role === 'member') {
      const m = DB.members.find(x => x.memberId === currentUser.memberId || x.email === currentUser.email);
      if (m && m.avatar) avatar = m.avatar;
    } else {
      const u = DB.users.find(x => String(x.id) === String(currentUser.id) || x.email === currentUser.email);
      if (u && u.avatar) avatar = u.avatar;
    }
    
    if (!avatar && currentUser.avatar) {
      avatar = currentUser.avatar;
    }
    
    if (avatar) {
      navAv.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;" referrerPolicy="no-referrer" />`;
      navAv.style.backgroundImage = 'none';
    } else {
      navAv.style.backgroundImage = 'none';
      navAv.innerHTML = initials(currentUser.name);
    }
  }
}

// ════ HELPERS ════
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  const d=document.createElement('div');
  d.className=`toast-item ${type}`;
  d.textContent=msg;
  t.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}
function fmt(d){if(!d)return '—';const x=new Date(d);return x.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];}
function daysDiff(d){return Math.floor((new Date()-new Date(d))/(1000*86400));}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function openModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="closeModalOutside(event)">${html}</div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function closeModalOutside(e){if(e.target.className==='modal-overlay')closeModal();}

function saveBook(){
  const title=document.getElementById('bk-title').value.trim();
  const author=document.getElementById('bk-author').value.trim();
  if(!title||!author){toast('Title and author are required.','error');return;}
  const copies=parseInt(document.getElementById('bk-copies').value)||1;
  DB.books.push({id:DB.nextId.book++,isbn:document.getElementById('bk-isbn').value.trim()||'N/A',title,author,category:document.getElementById('bk-cat').value.trim()||'General',shelf:document.getElementById('bk-shelf').value.trim()||'TBD',copies,available:copies,year:parseInt(document.getElementById('bk-year').value)||new Date().getFullYear()});
  closeModal();saveLocalState();toast(`"${title}" added to catalogue.`);renderBooks();
}
function openEditBook(id){
  const b=DB.books.find(x=>x.id===id);
  if(!b)return;
  openModal(`<div class="modal">
    <div class="modal-header"><h3>Edit Book</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">

      </div>
      <div class="form-row">

      </div>

        <div class="form-group"><label>Shelf</label><input id="bk-shelf" type="text" value="${escHtml(b.shelf)}"/></div>
      </div>
      <div class="form-group"><label>Total Copies</label><input id="bk-copies" type="number" value="${b.copies}" min="1"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-navy" onclick="updateBook(${id})">Save Changes</button>
    </div>
  </div>`);
}
function updateBook(id){
  const b=DB.books.find(x=>x.id===id);
  const borrowed=b.copies-b.available;
  const newCopies=parseInt(document.getElementById('bk-copies').value)||1;
  b.title=document.getElementById('bk-title').value.trim();
  b.author=document.getElementById('bk-author').value.trim();
  b.isbn=document.getElementById('bk-isbn').value.trim();
  b.category=document.getElementById('bk-cat').value.trim();
  b.shelf=document.getElementById('bk-shelf').value.trim();
  b.year=parseInt(document.getElementById('bk-year').value)||b.year;
  b.copies=newCopies;
  b.available=Math.max(0,newCopies-borrowed);
  closeModal();saveLocalState();toast('Book updated.');renderBooks();
}
function deleteBook(id){
  if(!confirm('Delete this book from the catalogue?'))return;
  DB.books=DB.books.filter(b=>b.id!==id);
  saveLocalState();toast('Book removed.','error');renderBooks();
}

function updateMember(id){
  const m=DB.members.find(x=>x.id===id);
  m.name=document.getElementById('mb-name').value.trim();
  m.email=document.getElementById('mb-email').value.trim();
  m.phone=document.getElementById('mb-phone').value.trim();
  m.course=document.getElementById('mb-course').value.trim();
  m.year=parseInt(document.getElementById('mb-year').value);
  if (uploadedModalAvatar) {
    m.avatar = uploadedModalAvatar;
  }
  // Also update corresponding user object if any
  const u = DB.users.find(x => x.memberId === m.memberId);
  if (u) {
    u.name = m.name;
    if (uploadedModalAvatar) {
      u.avatar = uploadedModalAvatar;
    }
  }
  closeModal();saveLocalState();toast('Member updated.');renderMembers();
}
function toggleMember(id){
  const m=DB.members.find(x=>x.id===id);
  m.status=m.status==='active'?'suspended':'active';
  saveLocalState();
  toast(`${m.name} ${m.status==='active'?'activated':'suspended'}.`,m.status==='active'?'success':'error');
  renderMembers();
}

        ${activeLoans().length===0?'<p style="color:var(--muted);font-size:.85rem">No active loans.</p>':''}
        ${activeLoans().map(l=>{
          const overdue=l.due<today();
          const days=daysDiff(l.due);
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:1px solid var(--parchment-dark)">
            <div>
              <div style="font-weight:600;font-size:.85rem">${escHtml(l.bookTitle)}</div>
              <div style="font-size:.75rem;color:var(--muted)">${escHtml(l.memberName)} · Due ${fmt(l.due)}</div>
            </div>
            <span class="badge ${overdue?'badge-red':'badge-green'}">${overdue?days+'d overdue':'Active'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('bw-member').addEventListener('keydown',e=>{if(e.key==='Enter')lookupMember();});

function lookupMember(){
  const q=document.getElementById('bw-member').value.trim().toLowerCase();
  const m=DB.members.find(x=>x.memberId.toLowerCase()===q||x.email.toLowerCase()===q);
  const info=document.getElementById('bw-member-info');
  if(!m){info.innerHTML=`<div class="alert alert-red">⚠️ Member not found. Check the ID or email.</div>`;return;}
  if(m.status==='suspended'){info.innerHTML=`<div class="alert alert-red">⛔ This member's account is suspended. Cannot issue books.</div>`;return;}
  const active=activeLoans().filter(l=>l.memberId===m.memberId);
  const overdue=active.filter(l=>l.due<today());
  let alerts='';
  if(active.length>=m.loanLimit)alerts+=`<div class="alert alert-red">⚠️ Loan limit reached (${m.loanLimit} books). Return a book first.</div>`;
  if(overdue.length>0)alerts+=`<div class="alert alert-orange">⚠️ Member has ${overdue.length} overdue loan(s). Proceed with caution.</div>`;
  if(m.fines>0)alerts+=`<div class="alert alert-orange">⚠️ Outstanding fines of KES ${m.fines}.</div>`;
  info.innerHTML=`<div class="alert alert-blue" style="flex-direction:column;align-items:flex-start">
    <strong>${escHtml(m.name)}</strong>
    <span>${m.memberId} · ${escHtml(m.course)}, Year ${m.year}</span>
    <span>Active loans: ${active.length} / ${m.loanLimit}</span>
  </div>${alerts}`;
}
function issueLoan(){
  const q=document.getElementById('bw-member').value.trim().toLowerCase();
  const m=DB.members.find(x=>x.memberId.toLowerCase()===q||x.email.toLowerCase()===q);
  const bookId=parseInt(document.getElementById('bw-book').value);
  if(!m){toast('Please enter a valid member ID or email.','error');return;}
  if(!bookId){toast('Please select a book.','error');return;}
  if(m.status==='suspended'){toast('Cannot issue to a suspended member.','error');return;}
  const active=activeLoans().filter(l=>l.memberId===m.memberId);
  if(active.length>=m.loanLimit){toast(`Loan limit reached for ${m.name}.`,'error');return;}
  const book=DB.books.find(b=>b.id===bookId);
  if(!book||book.available===0){toast('Book is not available.','error');return;}
  const days=parseInt(document.getElementById('bw-days').value);
  const issued=today();
  const due=addDays(issued,days);
  book.available--;
  DB.loans.push({id:DB.nextId.loan++,bookId,memberId:m.memberId,bookTitle:book.title,memberName:m.name,issued,due,returned:null,fine:0});
  saveLocalState();
  toast(`"${book.title}" issued to ${m.name}. Due ${fmt(due)}.`);
  renderBorrow();
}

// ════ RETURNS ════
function renderReturns(){
  setHeader('Process Returns','Accept returned books and calculate fines.');
  document.getElementById('main-content').innerHTML=`
    <div class="toolbar">
      <div class="search-box"><input type="text" id="ret-search" placeholder="Search active loans…" oninput="filterReturns()"/></div>
    </div>
    <div id="returns-list">
      ${renderReturnsList(activeLoans())}
    </div>`;
}
function filterReturns(){
  const q=document.getElementById('ret-search').value.toLowerCase();
  const filtered=activeLoans().filter(l=>l.bookTitle.toLowerCase().includes(q)||l.memberName.toLowerCase().includes(q)||l.memberId.toLowerCase().includes(q));
  document.getElementById('returns-list').innerHTML=renderReturnsList(filtered);
}
function renderReturnsList(loans){
  if(loans.length===0)return`<div class="empty-state"><div class="icon">📚</div><h3>No Active Loans</h3><p>All books have been returned.</p></div>`;
  return`<div class="table-wrap"><table>
    <thead><tr><th>Member</th><th>Book</th><th>Issued</th><th>Due</th><th>Status</th><th>Fine (KES)</th><th>Action</th></tr></thead>
    <tbody>${loans.map(l=>{
      const overdue=l.due<today();
      const days=overdue?daysDiff(l.due):0;
      const fine=days*10;
      return`<tr>
        <td><strong>${escHtml(l.memberName)}</strong><div style="font-size:.73rem;color:var(--muted)">${l.memberId}</div></td>
        <td>${escHtml(l.bookTitle)}</td>
        <td>${fmt(l.issued)}</td>
        <td style="color:${overdue?'var(--crimson)':'inherit'};font-weight:${overdue?700:400}">${fmt(l.due)}</td>
        <td><span class="badge ${overdue?'badge-red':'badge-green'}">${overdue?days+'d late':'On Time'}</span></td>
        <td style="font-weight:${fine>0?700:400};color:${fine>0?'var(--crimson)':'inherit'}">${fine>0?'KES '+fine:'—'}</td>
        <td><button class="btn btn-sm btn-success" onclick="processReturn(${l.id})">Return</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}
function processReturn(loanId){
  const loan=DB.loans.find(l=>l.id===loanId);
  if(!loan)return;
  const book=DB.books.find(b=>b.id===loan.bookId);
  const overdue=loan.due<today();
  const days=overdue?daysDiff(loan.due):0;
  const fine=days*10;
  loan.returned=today();
  loan.fine=fine;
  if(book)book.available++;
  if(fine>0){
    const m=DB.members.find(x=>x.memberId===loan.memberId);
    if(m)m.fines+=fine;
    DB.fines.push({id:DB.nextId.fine++,memberId:loan.memberId,memberName:loan.memberName,loanId,bookTitle:loan.bookTitle,amount:fine,date:today(),paid:false});
    saveLocalState();
    toast(`"${loan.bookTitle}" returned. Fine of KES ${fine} raised.`,'error');
  } else {
    saveLocalState();
    toast(`"${loan.bookTitle}" returned on time. No fine.`);
  }
  renderReturns();
}

// ════ FINES ════
function renderFines(){
  setHeader('Fines Ledger','Track and collect outstanding library fines.');
  const unpaid=DB.fines.filter(f=>!f.paid);
  const total=unpaid.reduce((s,f)=>s+f.amount,0);
  const collected=DB.fines.filter(f=>f.paid).reduce((s,f)=>s+f.amount,0);
  document.getElementById('main-content').innerHTML=`
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.5rem">
      <div class="stat-card red"><div class="stat-label">Outstanding (KES)</div><div class="stat-value">${total.toLocaleString()}</div></div>
      <div class="stat-card green"><div class="stat-label">Collected (KES)</div><div class="stat-value">${collected.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Total Cases</div><div class="stat-value">${DB.fines.length}</div></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="exportCSV(DB.fines.map(f=>({Member:f.memberName,Book:f.bookTitle,Amount:f.amount,Date:f.date,Paid:f.paid?'Yes':'No'})),'fines')">↓ Export</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Member</th><th>Book</th><th>Amount (KES)</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          ${DB.fines.map(f=>`<tr>
            <td><strong>${escHtml(f.memberName)}</strong></td>
            <td>${escHtml(f.bookTitle)}</td>
            <td style="font-weight:700;color:${f.paid?'var(--success)':'var(--crimson)'}">KES ${f.amount.toLocaleString()}</td>
            <td>${fmt(f.date)}</td>
            <td><span class="badge ${f.paid?'badge-green':'badge-red'}">${f.paid?'Paid':'Unpaid'}</span></td>
            <td>${f.paid?'<span style="color:var(--muted);font-size:.8rem">—</span>':`<button class="btn btn-sm btn-success" onclick="markPaid(${f.id})">Mark Paid</button>`}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
function markPaid(id){
  const f=DB.fines.find(x=>x.id===id);
  if(!f)return;
  f.paid=true;
  const m=DB.members.find(x=>x.memberId===f.memberId);
  if(m)m.fines=Math.max(0,m.fines-f.amount);
  saveLocalState();
  toast(`Fine of KES ${f.amount} marked as paid.`);
  renderFines();
}

let reportTab='inventory';
function renderReports(){
  setHeader('Reports','Library analytics, loan history, and inventory summaries.');

      <button class="report-tab ${reportTab==='inventory'?'active':''}" onclick="switchReport('inventory')">Inventory</button>

function switchReport(tab){reportTab=tab;renderReports();}
function renderReportContent(){
  const el=document.getElementById('report-content');
  if(reportTab==='inventory'){
    const cats=[...new Set(DB.books.map(b=>b.category))];
    el.innerHTML=`<div class="card">
      <div class="card-title">Inventory by Category</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Category</th><th>Titles</th><th>Total Copies</th><th>Available</th><th>On Loan</th><th>Utilisation</th></tr></thead>
        <tbody>${cats.map(cat=>{
          const books=DB.books.filter(b=>b.category===cat);
          const titles=books.length;
          const copies=books.reduce((s,b)=>s+b.copies,0);
          const avail=books.reduce((s,b)=>s+b.available,0);
          const onLoan=copies-avail;
          const util=copies>0?Math.round(onLoan/copies*100):0;
          return`<tr>
            <td><strong>${cat}</strong></td>
            <td>${titles}</td>
            <td>${copies}</td>
            <td style="color:var(--success)">${avail}</td>
            <td style="color:var(--crimson)">${onLoan}</td>
            <td><div style="display:flex;align-items:center;gap:.5rem">
              <div style="flex:1;height:6px;background:var(--parchment-dark);border-radius:3px"><div style="height:6px;background:var(--navy);border-radius:3px;width:${util}%"></div></div>
              <span style="font-size:.75rem;font-weight:600;width:2.5rem">${util}%</span>
            </div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  } else if(reportTab==='topbooks'){
    const counts={};
    DB.loans.forEach(l=>{counts[l.bookTitle]=(counts[l.bookTitle]||0)+1;});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    el.innerHTML=`<div class="card">
      <div class="card-title">Most Borrowed Books</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Rank</th><th>Title</th><th>Times Borrowed</th><th>Popularity</th></tr></thead>
        <tbody>${sorted.map(([title,count],i)=>`<tr>
          <td style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy)">${i+1}</td>
          <td><strong>${escHtml(title)}</strong></td>
          <td style="text-align:center;font-weight:700;font-size:1.1rem">${count}</td>
          <td><div style="display:flex;align-items:center;gap:.5rem">
            <div style="flex:1;height:6px;background:var(--parchment-dark);border-radius:3px"><div style="height:6px;background:var(--crimson);border-radius:3px;width:${Math.round(count/sorted[0][1]*100)}%"></div></div>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  } else {
    el.innerHTML=`<div class="card">
      <div class="card-title">Complete Loan History (${DB.loans.length} records)</div>
      <div class="toolbar" style="margin-bottom:1rem">
        <button class="btn btn-ghost" onclick="exportCSV(DB.loans.map(l=>({Book:l.bookTitle,Member:l.memberName,MemberID:l.memberId,Issued:l.issued,Due:l.due,Returned:l.returned||'Active',Fine:l.fine})),'loan-history')">↓ Export CSV</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Book</th><th>Member</th><th>Issued</th><th>Due</th><th>Returned</th><th>Fine (KES)</th></tr></thead>
        <tbody>${DB.loans.map(l=>`<tr>
          <td><strong>${escHtml(l.bookTitle)}</strong></td>
          <td>${escHtml(l.memberName)} <span style="color:var(--muted);font-size:.75rem">${l.memberId}</span></td>
          <td>${fmt(l.issued)}</td>
          <td>${fmt(l.due)}</td>
          <td>${l.returned?fmt(l.returned):'<span class="badge badge-orange">Active</span>'}</td>
          <td style="color:${l.fine>0?'var(--crimson)':'inherit'};font-weight:${l.fine>0?700:400}">${l.fine>0?'KES '+l.fine:'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }
}

      <div class="stat-card red"><div class="stat-label">Overdue</div><div class="stat-value">${overdue.length}</div></div>
      <div class="stat-card orange"><div class="stat-label">Fines (KES)</div><div class="stat-value">${m.fines.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Total Borrowed</div><div class="stat-value">${myLoans.length}</div></div>
    </div>
    <div class="member-grid">
      <div class="card">
        <div class="card-title">Active Loans</div>
        ${active.length===0?`<div class="empty-state" style="padding:1.5rem 0"><div class="icon">📚</div><p>No active loans.</p></div>`:''}
        ${active.map(l=>{

              <span style="font-size:.75rem;color:${od?'var(--crimson)':'var(--muted)'}">Due: ${fmt(l.due)}</span>
              <span class="badge ${od?'badge-red':'badge-green'}">${od?daysDiff(l.due)+'d late':'Active'}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">Loan History</div>
        ${myLoans.filter(l=>l.returned).length===0?`<div class="empty-state" style="padding:1.5rem 0"><div class="icon">🕐</div><p>No past loans.</p></div>`:''}
        ${myLoans.filter(l=>l.returned).map(l=>`<div style="padding:.65rem 0;border-bottom:1px solid var(--parchment-dark)">
          <div style="font-weight:600;font-size:.85rem">${escHtml(l.bookTitle)}</div>
          <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:.25rem">
            <span>Returned ${fmt(l.returned)}</span>
            ${l.fine>0?`<span style="color:var(--crimson);font-weight:600">Fine: KES ${l.fine}</span>`:'<span style="color:#2d6a4f">No fine</span>'}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}

// ════ CATALOGUE (MEMBER) ════
let catSearch='',catCat='all';
function renderCatalog(){
  setHeader('Book Catalogue','Browse books available in the library.');
  let filtered=DB.books.filter(b=>{
    const s=catSearch.toLowerCase();
    const matchS=!s||b.title.toLowerCase().includes(s)||b.author.toLowerCase().includes(s);
    const matchC=catCat==='all'||b.category===catCat;
    return matchS&&matchC;
  });
  const cats=[...new Set(DB.books.map(b=>b.category))];
  document.getElementById('main-content').innerHTML=`
    <div class="toolbar">
      <div class="search-box"><input type="text" placeholder="Search by title or author…" value="${escHtml(catSearch)}" oninput="catSearch=this.value;renderCatalog()"/></div>
      <select class="filter" onchange="catCat=this.value;renderCatalog()">
        <option value="all">All Categories</option>
        ${cats.map(c=>`<option value="${c}" ${catCat===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Author</th><th>Category</th><th>Shelf</th><th>Availability</th></tr></thead>
        <tbody>${filtered.map(b=>`<tr>
          <td><strong>${escHtml(b.title)}</strong><div style="font-size:.73rem;color:var(--muted)">${b.isbn}</div></td>
          <td>${escHtml(b.author)}</td>
          <td><span class="badge badge-navy">${b.category}</span></td>
          <td style="font-family:monospace;font-size:.82rem">${b.shelf}</td>
          <td><span class="badge ${b.available>0?'badge-green':'badge-red'}">${b.available>0?b.available+' available':'Checked Out'}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

// ════ CSV EXPORT ════
function exportCSV(data,name){
  if (!data || data.length === 0) {
    toast('No data to export.', 'error');
    return;
  }
  const headers=Object.keys(data[0]);
  const rows=[headers.join(','),...data.map(r=>headers.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(','))];
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${name}-${today()}.csv`;
  a.click();
  toast(`${name}.csv exported.`);
}

function triggerAvatarUploadFromModal() {
  let input = document.getElementById('dynamic-avatar-input');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.id = 'dynamic-avatar-input';
    input.accept = 'image/*';
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    if (file.size > 50 * 1024 * 1024) {
      toast('Image is too large. Please select an image under 50MB.', 'error');
      return;
    }
    
    // Create an object URL for ultra-fast, high-performance loading of large images up to 50MB
    const objectUrl = URL.createObjectURL(file);
    
    // Open adjustable fit dialog
    let adjusterOverlay = document.getElementById('avatar-adjuster-overlay');
    if (!adjusterOverlay) {
      adjusterOverlay = document.createElement('div');
      adjusterOverlay.id = 'avatar-adjuster-overlay';
      adjusterOverlay.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(4px);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        font-family: 'Inter', sans-serif;
      `;
      document.body.appendChild(adjusterOverlay);
    }
    
    adjusterOverlay.innerHTML = `
      <div style="background: white; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column;">
        <div style="padding: 1.25rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
          <h4 style="font-family:'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--navy, #0f172a); margin: 0;">Adjust Profile Photo</h4>
          <button id="adjuster-close-btn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #64748b; line-height: 1;">&times;</button>
        </div>
        
        <div style="padding: 1.5rem; display: flex; flex-direction: column; align-items: center; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
          <!-- Circular Crop viewport boundary -->
          <div id="adjuster-viewport" style="position: relative; width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 4px solid #4f46e5; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: #94a3b8; cursor: move; user-select: none;">
            <img id="adjuster-image" style="position: absolute; transform-origin: top left; pointer-events: none; transition: none; max-width: none;" />
          </div>
          
          <p style="font-size: 0.85rem; color: #64748b; margin-top: 1rem; text-align: center; font-weight: 5
+00;">Drag the photo to move, slider to enlarge.</p>
          
          <!-- Zoom controls -->
          <div style="width: 100%; display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem; padding: 0 1rem;">
            <span style="font-size: 1rem; user-select: none; color: #64748b; font-weight: 600;">A</span>
            <input type="range" id="adjuster-zoom" min="100" max="400" value="100" style="flex: 1; accent-color: #4f46e5; cursor: pointer; height: 6px; border-radius: 3px;" />
            <span style="font-size: 1.4rem; user-select: none; color: #64748b; font-weight: 600;">A</span>
          </div>
        </div>
        
        <div style="padding: 1rem 1.25rem; display: flex; justify-content: flex-end; gap: 0.75rem; background: #ffffff;">
          <button id="adjuster-cancel" style="padding: 0.55rem 1.2rem; border-radius: 8px; border: 1px solid #cbd5e1; background: transparent; cursor: pointer; font-family: inherit; font-size: .875rem; font-weight: 500; color: #475569;">Cancel</button>
          <button id="adjuster-save" style="padding: 0.55rem 1.2rem; border-radius: 8px; border: none; background: #0f172a; color: white; cursor: pointer; font-family: inherit; font-size: .875rem; font-weight: 600;">Save Selection</button>
        </div>
      </div>
    `;
    
    const img = document.getElementById('adjuster-image');
    img.src = objectUrl;
    
    const viewport = document.getElementById('adjuster-viewport');
    const zoomSlider = document.getElementById('adjuster-zoom');
    
    let scale = 1.0;
    let fitW = 280;
    let fitH = 280;
    let x = 0;
    let y = 0;
    
    img.onload = function() {
      const imgW = img.naturalWidth;
      const imgH = img.naturalHeight;
      
      if (imgW > imgH) {
        fitH = 280;
        fitW = (imgW / imgH) * 280;
      } else {
        fitW = 280;
        fitH = (imgH / imgW) * 280;
      }
      
      // Center coordinates initially
      x = (280 - fitW) / 2;
      y = (280 - fitH) / 2;
      updateImageTransform();
    };
    
    function updateImageTransform() {
      img.style.width = fitW + 'px';
      img.style.height = fitH + 'px';
      img.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }
    
    function clampPosition() {
      const currentW = fitW * scale;
      const currentH = fitH * scale;
      
      if (currentW >= 280) {
        x = Math.max(280 - currentW, Math.min(0, x));
      } else {
        x = (280 - currentW) / 2;
      }
      
      if (currentH >= 280) {
        y = Math.max(280 - currentH, Math.min(0, y));
      } else {
        y = (280 - currentH) / 2;
      }
    }
    
    zoomSlider.oninput = function() {
      const ratio = parseInt(zoomSlider.value) / 100;
      const oldScale = scale;
      scale = ratio;
      
      // Center zooming around center of 280px viewport
      const viewportCenter = 140;
      x = viewportCenter - (viewportCenter - x) * (scale / oldScale);
      y = viewportCenter - (viewportCenter - y) * (scale / oldScale);
      
      clampPosition();
      updateImageTransform();
    };
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    
    viewport.onmousedown = function(e) {
      isDragging = true;
      startX = e.clientX - x;
      startY = e.clientY - y;
      viewport.style.cursor = 'grabbing';
      e.preventDefault();
    };
    
    window.onmousemove = function(e) {
      if (!isDragging) return;
      x = e.clientX - startX;
      y = e.clientY - startY;
      clampPosition();
      updateImageTransform();
    };
    
    window.onmouseup = function() {
      if (isDragging) {
        isDragging = false;
        viewport.style.cursor = 'move';
      }
    };
    
    viewport.ontouchstart = function(e) {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - x;
        startY = e.touches[0].clientY - y;
      }
    };
    
    viewport.ontouchmove = function(e) {
      if (!isDragging || e.touches.length !== 1) return;
      x = e.touches[0].clientX - startX;
      y = e.touches[0].clientY - startY;
      clampPosition();
      updateImageTransform();
      e.preventDefault();
    };
    
    viewport.ontouchend = function() {
      isDragging = false;
    };
    
    function closeAdjuster() {
      URL.revokeObjectURL(objectUrl);
      adjusterOverlay.remove();
    }
    
    document.getElementById('adjuster-close-btn').onclick = closeAdjuster;
    document.getElementById('adjuster-cancel').onclick = closeAdjuster;
    
    document.getElementById('adjuster-save').onclick = function() {
      // Save crop on a 400x400 high resolution canvas
      const canvas = document.createElement('canvas');
      canvas.width = 400;
      canvas.height = 400;
      const ctx = canvas.getContext('2d');
      
      const ratio = 400 / 280;
      const renderX = x * ratio;
      const renderY = y * ratio;
      const renderW = fitW * scale * ratio;
      const renderH = fitH * scale * ratio;
      
      // Draw image
      ctx.drawImage(img, renderX, renderY, renderW, renderH);
      
      // Compress with JPEG to ensure tiny local storage usage
      const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
      
      const preview = document.getElementById('modal-avatar-preview');
      if (preview) {
        const existingImg = document.getElementById('modal-avatar-img');
        if (existingImg) {
          existingImg.src = compressedDataUrl;
        } else {
          const initialsEl = document.getElementById('modal-avatar-initials');
          if (initialsEl) initialsEl.style.display = 'none';
          
          const avatarImg = document.createElement('img');
          avatarImg.id = 'modal-avatar-img';
          avatarImg.src = compressedDataUrl;
          avatarImg.style.width = '100%';
          avatarImg.style.height = '100%';
          avatarImg.style.objectFit = 'cover';
          avatarImg.style.position = 'absolute';
          avatarImg.style.top = '0';
          avatarImg.style.left = '0';
          avatarImg.referrerPolicy = 'no-referrer';
          preview.insertBefore(avatarImg, preview.firstChild);
        }
      }
      
      uploadedModalAvatar = compressedDataUrl;
      closeAdjuster();
    };
  };
  
  input.click();
}

function saveProfileChanges() {
  const newName = document.getElementById('profile-name').value.trim();
  if (!newName) {
    toast('Name is required.', 'error');
    return;
  }
  
  currentUser.name = newName;
  
  const mainUser = DB.users.find(u => u.id === currentUser.id);
  if (mainUser) {
    mainUser.name = newName;
    if (uploadedModalAvatar) {
      mainUser.avatar = uploadedModalAvatar;
    }
  }
  
  if (currentUser.role === 'member') {
    const m = DB.members.find(x => x.memberId === currentUser.memberId);
    if (m) {
      m.name = newName;
      m.phone = document.getElementById('profile-phone').value.trim();
      m.course = document.getElementById('profile-course').value.trim();
      m.year = parseInt(document.getElementById('profile-year').value) || 1;
      if (uploadedModalAvatar) {
        m.avatar = uploadedModalAvatar;
      }
    }
  } else {
    if (uploadedModalAvatar) {
      currentUser.avatar = uploadedModalAvatar;
    }
  }
  
  document.getElementById('nav-username').textContent = currentUser.name;
  
  closeModal();
  saveLocalState();
  updateNavAvatar();
  toast('Profile updated successfully!');
  
  if (currentPage === 'myportal') {
    renderMyPortal();
  } else if (currentPage === 'dashboard') {
    renderDashboard();
  } else if (currentPage === 'members') {
    renderMembers();
  }
}
